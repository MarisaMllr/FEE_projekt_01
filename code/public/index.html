<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TODO'S</title>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.3/handlebars.min.js"
            integrity="sha256-/PJBs6QWvXijOFIX04kZpLb6ZtSQckdOIavLWKKOgXU="
            crossorigin="anonymous"
            defer
        ></script>
        <script src="scripts/index.js" type="module"></script>

        <link rel="stylesheet" href="styles/index.css" />
    </head>
    <body>
        <header id="main-header">
            <div class="images__startofpage">
                <img src="./img/character_01.svg" alt="">
                <img src="./img/character_01.svg" alt="">
                <img src="./img/character_01.svg" alt="">
            </div>
            <h1 class="page-title">TODO'S</h1>
        </header>
        <main>
            <section class="todos">
                <header class="todos__header">
                    <div class="todos__header__controls">
                        <button id="btn-create-todo" class="btn btn--default btn--create-todo">
                            Neues Todo
                        </button>
                        <h2 class="todos__header__message">
                            Hier dynamischer Titel
                        </h2>
                        <button id="btn-change-theme" class="btn btn--theme" aria-label="Theme wechseln">
                            <svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 168 158.6">
                                <path class="path" d="M52.3,20.3V0c.1,0,10.5,0,10.5,0v10.6l10.4.2v20.9c0,0,10.8,0,10.8,0V10.6l10.6-.2.2-10.6h10.2s0,21.2,0,21.2h-10.6c0,.1,0,10.5,0,10.5h21.3c0,0,.1-21,.1-21l10.4-.2V0c0,0,10.4,0,10.4,0v21.1c0,0-10.6,0-10.6,0v21.1h10.8c0,0,0-10.5,0-10.5h21.1s0,10.5,0,10.5h-10.7s0,10.7,0,10.7h-10.5s.1,10.6.1,10.6h21.1s0,10.5,0,10.5h10.1c0,0,0,10.6,0,10.6h-20.5c0,0,0-10.6,0-10.6h-10.7v21.2h21.2v10.5c0,0-31.7.1-31.7.1v10.4c0,0,10.5.2,10.5.2v10.3s10.6.2,10.6.2v21.1s-10.3,0-10.3,0v-10.6s-10.5-.2-10.5-.2l-.2-10.5h-21.2s0,10.7,0,10.7l10.5-.2.2,10.6h10.5c0,0,0,10.5,0,10.5h-21.1v-10.5c0,0-9.6,0-9.6,0l-.9.4-.3,10.1h-20.7l-.2-10.4h-10.5v-21.2s-10.8,0-10.8,0v10.5s-10.6,0-10.6,0v10.6c0,0-20.9,0-20.9,0v-10.7c.1,0,10.6.2,10.6.2v-10.8s10.6,0,10.6,0v-10.6c0,0-21.3,0-21.3,0l-.2,10.6h-10.4s0,10.4,0,10.4H0c0,0,0-21.1,0-21.1l10.1.2v-10.7c0,0,10.7,0,10.7,0v-10.6c0,0-20.8,0-20.8,0v-10.6h20.6v-10.6c.1,0-10.6,0-10.6,0v-10.7c0,0-10,0-10,0v-10.6s20.5,0,20.5,0l.4-.5-.2-10-10.6-.2v-10.4c0,0,20.4,0,20.4,0l.8-.3v-10.2s-10.4-.1-10.4-.1v-10.5h20.9v10.6c0,0,9.8,0,9.8,0l.9-.8h0ZM52.5,21l-.4.8v9.8c0,0,10.8,0,10.8,0v-10.5s-10.4,0-10.4,0h0ZM31.5,31.6l-.5.8v9.8h10.8s0-10.5,0-10.5c0,0-10.3,0-10.3,0ZM21.5,52.8l-1,.7.3,10,10.5-.2v-10.5s-9.8,0-9.8,0h0ZM73.6,95.1v-21.3c0,0-10.7,0-10.7,0l-.2,10.5h-10.3l.2-10.4h10.5v-10.7h-21.4s.1,10.6.1,10.6h-10.7s.1,21.3.1,21.3h10.5c0,0,0,10.5,0,10.5h21.3s0-10.5,0-10.5h10.6c0,0,0,0,0,0ZM94.1,73.7h-10.1v21.3l10.4.2v10.4s21.4,0,21.4,0v-10.6s10.5,0,10.5,0v-21.3s-10.5.1-10.5.1v-10.7c0,0-21.4,0-21.4,0v10.1c.1,0,1.1.5,1.1.5h9.5c0,0,0,10.3,0,10.3h-10.3c0,0,0-9.8,0-9.8l-.7-.7h0ZM94.7,147.2v-20.4h-21.5c0-.1,0,10.6,0,10.6h10.7s0,10.5,0,10.5h10.5l.2-.6h0Z"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="todos__header__sort">
                        <button class="sort__toggle btn btn--default" aria-expanded="false" aria-controls="sort-options">
                            Sortieren
                        </button>
                        <div class="sort__options">
                            <div id="sort-options" hidden>
                                <button class="btn btn--default btn--sort" data-sort="title">Name</button>
                                <button class="btn btn--default btn--sort" data-sort="date_due">Nach Fälligkeitsdatum</button>
                                <button class="btn btn--default btn--sort" data-sort="date_create">Nach Erstellungsdatum</button>
                                <button class="btn btn--default btn--sort" data-sort="importance">Nach Wichtigkeit</button>
                            </div>
                            <button class="btn btn--default btn--filter">
                                Nur offene
                            </button>
                        </div>
                    </div>
                </header>
            </section>

            <section id="todos">

            </section>

            <dialog id="dialog-create-todo" class="dialog" aria-modal="true" role="dialog" aria-labelledby="dialog-title" hidden>
                <header class="dialog__header">
                    <h2 id="dialog-title">Todo erstellen</h2>
                    <button id="btn-close" class="btn btn--close" aria-label="Dialog schliessen"></button>
                </header>
                <form id="form-create-todo" class="dialog__form">
                    <label for="title">Titel</label>
                    <input type="text" id="title" name="title" required>

                    <fieldset class="rating">
                        <legend>Wichtigkeit</legend>
                        
                        <input type="radio" name="importance" id="importance-5" value="5">
                        <label for="importance-5">⚡</label>

                        <input type="radio" name="importance" id="importance-4" value="4">
                        <label for="importance-4">⚡</label>

                        <input type="radio" name="importance" id="importance-3" value="3">
                        <label for="importance-3">⚡</label>

                        <input type="radio" name="importance" id="importance-2" value="2">
                        <label for="importance-2">⚡</label>

                        <input type="radio" name="importance" id="importance-1" value="1" checked>
                        <label for="importance-1">⚡</label>
                    </fieldset>

                    <label for="date_due">Fälligkeitsdatum</label>
                    <input type="date" id="date_due" name="date_due" required>

                    <label for="completed">
                        <input type="checkbox" id="completed" name="completed">
                        Erledigt
                    </label>

                    <label for="description">Beschreibung</label>
                    <textarea id="description" name="description" rows="4"></textarea>

                    <div class="dialog__actions">
                        <button type="submit" class="btn btn--default" value="create">Erstellen</button>
                        <button type="submit" class="btn btn--default" value="create-overview">Erstellen & Übersicht</button>
                        <button type="submit" class="btn btn--default" value="overview">Übersicht</button>
                    </div>
                </form>
            </dialog>
        </main>
        <footer id="footer">
            <p class="small footer__description">
                Entstanden im Rahmen der Weiterbildung 
                CAS Frontend Engineering an der Fachhochschule Ost.
            </p>
            <p class="small footer__copyright">
                © Marisa Müller
            </p>
            
        </footer>
        <img class="img--endofpage" src="./img/character_03.svg" alt="">
    </body>
</html>
